name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver bump or exact version, for example patch, minor, major, or 0.2.0"
        required: true
        default: patch

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Ensure generated files are committed
        run: git diff --exit-code
      - name: Validate npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami
      - name: Configure release identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Refresh release branch
        run: git pull --ff-only origin "${{ github.ref_name }}"
      - name: Version package
        run: npm version "${{ inputs.version }}" -m "Release v%s"
      - name: Push release commit and tag
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release create "v${VERSION}" --generate-notes --verify-tag
