name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver bump or exact version, for example patch, minor, major, or 0.2.0"
        required: true
        default: patch

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Ensure generated files are committed
        run: git diff --exit-code
      - name: Validate npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami
      - name: Configure release identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Refresh release branch
        run: git pull --ff-only origin "${{ github.ref_name }}"
      - name: Version package
        run: |
          npm version "${{ inputs.version }}" --no-git-tag-version
          pnpm sync:plugin-versions
          pnpm docs:check
          VERSION="$(node -p "require('./package.json').version")"
          git add package.json plugins/vizmatic/.codex-plugin/plugin.json plugins/vizmatic/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "Release v${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
      - name: Push release commit and tag
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          CURRENT_TAG="v${VERSION}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"

          {
            echo "## Changes since latest version"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "- Previous version: \`${PREVIOUS_TAG}\`"
              echo "- Current version: \`${CURRENT_TAG}\`"
              echo "- Diff: https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
              echo
              echo "### Commits"
              echo
              if git log --format='%H' "${PREVIOUS_TAG}..HEAD^" | grep -q .; then
                git log --reverse --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD^"
                echo
              else
                echo "- No product commits since ${PREVIOUS_TAG}; release metadata only."
              fi
            else
              echo "- Current version: \`${CURRENT_TAG}\`"
              echo "- Diff: initial release"
              echo
              echo "### Commits"
              echo
              git log --reverse --pretty=format:"- %s (%h)"
              echo
            fi
            echo
          } > release-notes.md

          cat release-notes.md

          if [ -n "$PREVIOUS_TAG" ]; then
            gh release create "$CURRENT_TAG" --generate-notes --notes-start-tag "$PREVIOUS_TAG" --notes-file release-notes.md --verify-tag
          else
            gh release create "$CURRENT_TAG" --generate-notes --notes-file release-notes.md --verify-tag
          fi
