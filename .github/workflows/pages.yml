name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm render:examples
      - run: pnpm docs:check
      - name: Ensure generated site is committed
        run: git diff --exit-code -- docs examples/README.md
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - id: deployment
        name: Create Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          artifact_id=""
          for _ in {1..30}; do
            artifact_id="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name == "github-pages") | .id' | head -n 1)"
            if [ -n "$artifact_id" ]; then
              break
            fi
            sleep 2
          done

          if [ -z "$artifact_id" ]; then
            echo "github-pages artifact not found" >&2
            exit 1
          fi

          oidc_token="$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')"

          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "OIDC token not available" >&2
            exit 1
          fi

          payload="$(mktemp)"
          jq -n \
            --argjson artifact_id "$artifact_id" \
            --arg pages_build_version "$GITHUB_SHA" \
            --arg oidc_token "$oidc_token" \
            '{
              artifact_id: $artifact_id,
              pages_build_version: $pages_build_version,
              oidc_token: $oidc_token
            }' > "$payload"

          response="$(gh api --method POST "repos/$GITHUB_REPOSITORY/pages/deployments" --input "$payload")"
          page_url="$(printf '%s' "$response" | jq -r '.page_url // empty')"
          deployment_id="$(printf '%s' "$response" | jq -r '.id // empty')"

          if [ -z "$deployment_id" ]; then
            echo "Pages deployment ID missing from response" >&2
            exit 1
          fi

          echo "page_url=${page_url:-https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/}" >> "$GITHUB_OUTPUT"
          echo "Created Pages deployment $deployment_id; waiting for publication."

          status=""
          for _ in {1..60}; do
            status="$(gh api "repos/$GITHUB_REPOSITORY/pages/deployments/$deployment_id" --jq '.status' 2>/dev/null || true)"
            case "$status" in
              succeed)
                echo "Pages deployment $deployment_id succeeded."
                exit 0
                ;;
              error|failed|cancelled|canceled)
                echo "Pages deployment $deployment_id failed with status: $status" >&2
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "Pages deployment $deployment_id did not complete; last status: ${status:-unavailable}" >&2
          exit 1
